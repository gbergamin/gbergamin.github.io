<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliografie nelle pagine AIB-WEB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap');

  :root {
    --bg:        #0e0f13;
    --surface:   #161820;
    --border:    #2a2d3a;
    --text:      #e8e9ef;
    --muted:     #6b7080;
    --accent:    #5b8dee;
    --c1:        #1e3a5f;  /* blu notte */
    --c1-border: #3a6ebf;
    --c1-text:   #b8d4ff;
    --c2:        #1a3d2b;  /* verde foresta */
    --c2-border: #2d7a4f;
    --c2-text:   #9de0b4;
    --c4:        #3a2a10;  /* ambra */
    --c4-border: #b07820;
    --c4-text:   #f5c96a;
    --cc:        #1f1e1e;  /* custom grigio caldo */
    --cc-border: #504848;
    --cc-text:   #d9d2d2;
    --radius:    10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    overflow: hidden;
  }

  /* ── header ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 52px;
    background: rgba(14,15,19,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 16px;
  }
  #header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: .04em;
    color: var(--text);
    flex: 1;
  }
  #header h1 span { color: var(--accent); }

  /* ── toolbar zoom ── */
  .toolbar {
    display: flex; gap: 4px; align-items: center;
  }
  .tb-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 16px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s, border-color .15s;
    font-family: 'Syne', sans-serif;
  }
  .tb-btn:hover { background: #22253a; color: var(--text); border-color: var(--accent); }
  #zoom-label {
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--muted);
    min-width: 44px; text-align: center;
    user-select: none;
  }

  /* ── hint ── */
  #hint {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 100;
    background: rgba(14,15,19,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12px; color: var(--muted);
    letter-spacing: .02em;
    pointer-events: none;
    opacity: 1; transition: opacity 2s ease;
  }
  #hint.fade { opacity: 0; }

  /* ── viewport ── */
  #viewport {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(91,141,238,.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(45,122,79,.04) 0%, transparent 60%);
  }
  #viewport:active { cursor: grabbing; }

  /* puntini di sfondo */
  #viewport::before {
    content: '';
    position: absolute; inset: -100%;
    background-image: radial-gradient(circle, rgba(255,255,255,.12) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  /* ── canvas world ── */
  #world {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* ── SVG edges ── */
  #edges-svg {
    position: absolute; top: 0; left: 0;
    overflow: visible;
    pointer-events: none;
  }
  .edge-path {
    fill: none;
    stroke: var(--border);
    stroke-width: 2;
    stroke-linecap: round;
  }
  .edge-arrow {
    fill: var(--border);
  }

  /* ── nodi ── */
  .node {
    position: absolute;
    border-radius: var(--radius);
    border: 1.5px solid;
    padding: 14px 16px;
    font-size: 13px; line-height: 1.55;
    transition: box-shadow .2s, border-color .2s;
    cursor: default;
  }
  .node:hover {
    z-index: 50 !important;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .node strong { font-weight: 600; }
  .node em     { font-style: italic; color: inherit; opacity: .8; }

  .node-1 { background: var(--c1); border-color: var(--c1-border); color: var(--c1-text); }
  .node-1:hover { border-color: #5591e8; }
  .node-2 { background: var(--c2); border-color: var(--c2-border); color: var(--c2-text); }
  .node-2:hover { border-color: #4dc87a; }
  .node-4 { background: var(--c4); border-color: var(--c4-border); color: var(--c4-text); }
  .node-4:hover { border-color: #e8a030; }
  .node-custom { background: var(--cc); border-color: var(--cc-border); color: var(--cc-text); }
  .node-custom:hover { border-color: #807070; }

  /* numero nodo */
  .node-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: .1em;
    opacity: .55;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="header">
  <h1>Bibliografie nelle pagine <span>AIB-WEB</span></h1>
  <div class="toolbar">
    <button class="tb-btn" id="btn-fit" title="Adatta alla finestra">⊞</button>
    <button class="tb-btn" id="btn-minus" title="Zoom out">−</button>
    <span id="zoom-label">100%</span>
    <button class="tb-btn" id="btn-plus" title="Zoom in">+</button>
  </div>
</div>

<div id="hint">Scorri per zoomare · Trascina per spostarti</div>

<div id="viewport">
  <div id="world">
    <svg id="edges-svg">
      <!-- archi -->
      <g id="edges-group"></g>
    </svg>
    <div id="nodes-container"></div>
  </div>
</div>

<script>
const NODES = [
  { x:-740, y:-460, w:240, h:205, color:'1', html:'<strong>| 1 |</strong> API su <strong>Apps Scripts</strong> (Google Workspace AIB) <em>in esecuzione periodica automatica</em>' },
  { x:-160, y:-610, w:200, h:100, color:'2', html:'<strong>| 3 |</strong> DB \'GRUPPO\' AIB <strong>ZOTERO</strong> AIB (api key)' },
  { x:-745, y:   0, w:250, h:180, color:'1', html:'<strong>| 6 |</strong> plugin <strong>AIB-bibliografia</strong> inserito come \'<strong>shortcode</strong>\' in una pagina Wordpress <strong>AIB-WEB</strong>' },
  { x:-460, y:-340, w:250, h:100, color:'1', html:'<strong>| 4 |</strong> Per i record nuovi o modificati converte e aggiorna' },
  { x:-460, y:-520, w:250, h:100, color:'1', html:'<strong>| 2 |</strong> In sola lettura legge' },
  { x:-160, y:-240, w:200, h:100, color:'2', html:'<strong>| 5 |</strong> Foglio Google (Google Workspace AIB)' },
  { x:  40, y:-495, w:250, h:240, color:'4', html:'<strong>| 1 bis |</strong> In alternativa l\'aggiornamento può essere fatto anche direttamente <em>modifiche dirette, importazioni massive ecc</em> (è una scelta di \'politiche\')' },
  { x:-460, y:   0, w:250, h:140, color:'1', html:'<strong>| 6 |</strong> gestisce la ricerca, la selezione e la presentazione all\'utente' },
  { x:  40, y:   0, w:250, h:120, color:'custom', html:'Disegno di massima <strong>Bibliografie nelle pagine AIB-WEB</strong>' },
];

// Archi: coordinate nel sistema del canvas (come dall'HTML originale)
// Il canvas originale aveva transform: translate(788px, 496.5px) scale(1) translate(227.5px, 215px)
// → offset totale: (1015.5, 711.5) ma i path usano coordinate canvas-relative (già shiftate)
// Usiamo i path SVG originali così come sono (coordinate relative al canvas world)
const EDGES = [
  { d: 'M-500 -357.5 L-493 -357.5 M-493,-357.5 C-343,-357.5 -317,-560 -167,-560', ax:-160, ay:-560, ar:90 },
  { d: 'M-500 -357.5 L-493 -357.5 M-493,-357.5 C-343,-357.5 -317,-190 -167,-190', ax:-160, ay:-190, ar:90 },
  { d: 'M165 -255 L165 -248 M165,-248 C165,-178 117,-190 47,-190',                  ax:  40, ay:-190, ar:270 },
  { d: 'M-495 90 L-488 90 M-488,90 C-338,90 -60,17 -60,-133',                       ax: -60, ay:-140, ar:0 },
];

// ── Calcola bounding box di tutti i nodi ──
function getBounds() {
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  NODES.forEach(n => {
    minX = Math.min(minX, n.x);
    minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + n.w);
    maxY = Math.max(maxY, n.y + n.h);
  });
  return { minX, minY, maxX, maxY, w: maxX-minX, h: maxY-minY };
}

// ── Popola DOM ──
const nodesContainer = document.getElementById('nodes-container');
const edgesGroup     = document.getElementById('edges-group');

NODES.forEach((n, i) => {
  const div = document.createElement('div');
  div.className = `node node-${n.color}`;
  div.style.cssText = `left:${n.x}px; top:${n.y}px; width:${n.w}px; min-height:${n.h}px; z-index:${i+2};`;
  div.innerHTML = n.html;
  nodesContainer.appendChild(div);
});

EDGES.forEach(e => {
  // path
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', e.d);
  path.setAttribute('class', 'edge-path');
  edgesGroup.appendChild(path);
  // freccia
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('style', `transform: translate(${e.ax}px,${e.ay}px) rotate(${e.ar}deg); transform-origin: 0 0;`);
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points','0,0 6.5,10.4 -6.5,10.4');
  poly.setAttribute('class','edge-arrow');
  g.appendChild(poly);
  edgesGroup.appendChild(g);
});

// ── Pan & Zoom ──
const viewport = document.getElementById('viewport');
const world    = document.getElementById('world');

let tx = 0, ty = 0, scale = 1;
const MIN = 0.08, MAX = 5;

function applyTransform(animate) {
  if (animate) world.style.transition = 'transform .35s cubic-bezier(.4,0,.2,1)';
  else          world.style.transition = 'none';
  world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zoom-label').textContent = Math.round(scale*100)+'%';
}

function fitAll(anim) {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const b  = getBounds();
  const pad = 60;
  const s  = Math.min(1, (vw - pad*2) / b.w, (vh - pad*2) / b.h);
  tx = (vw - b.w * s) / 2 - b.minX * s;
  ty = (vh - b.h * s) / 2 - b.minY * s;
  scale = s;
  applyTransform(anim);
}

fitAll(false);

// wheel zoom
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const rect  = viewport.getBoundingClientRect();
  const mx    = e.clientX - rect.left;
  const my    = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 1.12 : 0.89;
  const ns    = Math.min(MAX, Math.max(MIN, scale * delta));
  const r     = ns / scale;
  tx = mx - r*(mx - tx);
  ty = my - r*(my - ty);
  scale = ns;
  applyTransform(false);
}, { passive: false });

// mouse drag
let drag = false, sx, sy, stx, sty;
viewport.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  drag = true; sx = e.clientX; sy = e.clientY; stx = tx; sty = ty;
  viewport.style.cursor = 'grabbing';
  world.style.transition = 'none';
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  tx = stx + e.clientX - sx;
  ty = sty + e.clientY - sy;
  world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
});
window.addEventListener('mouseup', () => {
  drag = false; viewport.style.cursor = 'grab';
  document.getElementById('zoom-label').textContent = Math.round(scale*100)+'%';
});

// touch
let lt = null;
viewport.addEventListener('touchstart', e => { lt = e.touches; }, {passive:true});
viewport.addEventListener('touchmove', e => {
  e.preventDefault();
  world.style.transition = 'none';
  if (e.touches.length === 1 && lt?.length === 1) {
    tx += e.touches[0].clientX - lt[0].clientX;
    ty += e.touches[0].clientY - lt[0].clientY;
    world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  } else if (e.touches.length === 2 && lt?.length === 2) {
    const pd = Math.hypot(lt[0].clientX-lt[1].clientX, lt[0].clientY-lt[1].clientY);
    const cd = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const rect = viewport.getBoundingClientRect();
    const mx = (e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left;
    const my = (e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top;
    const r  = cd/pd;
    const ns = Math.min(MAX, Math.max(MIN, scale * r));
    const rr = ns/scale;
    tx = mx - rr*(mx-tx); ty = my - rr*(my-ty); scale = ns;
    world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  }
  lt = e.touches;
  document.getElementById('zoom-label').textContent = Math.round(scale*100)+'%';
}, {passive:false});
viewport.addEventListener('touchend', e => { lt = e.touches; }, {passive:true});

// pulsanti toolbar
document.getElementById('btn-plus').onclick  = () => {
  const s2 = Math.min(MAX, scale*1.25);
  const vw = viewport.clientWidth/2, vh = viewport.clientHeight/2;
  const r  = s2/scale;
  tx = vw - r*(vw-tx); ty = vh - r*(vh-ty); scale = s2;
  applyTransform(true);
};
document.getElementById('btn-minus').onclick = () => {
  const s2 = Math.max(MIN, scale/1.25);
  const vw = viewport.clientWidth/2, vh = viewport.clientHeight/2;
  const r  = s2/scale;
  tx = vw - r*(vw-tx); ty = vh - r*(vh-ty); scale = s2;
  applyTransform(true);
};
document.getElementById('btn-fit').onclick   = () => fitAll(true);

// hint fade
setTimeout(() => document.getElementById('hint').classList.add('fade'), 3500);

// resize
window.addEventListener('resize', () => fitAll(false));
</script>
</body>
</html>
